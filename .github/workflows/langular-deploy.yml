name: Build and Deploy Angular to MonsterASP

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use your required Node version

      - name: Install Dependencies
        # This replaces the need to have node_modules committed
        run: npm install

      - name: Build Project
        # This builds your app into the 'dist' folder
        run: npm run build

      - name: Deploy to Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.PUBLISH_URL }}
          username: ${{ secrets.PUBLISH_USER }}
          password: ${{ secrets.PUBLISH_PWD }}
          # Angular 17+ usually outputs to 'dist/<project-name>/browser'
          # Adjust this folder name based on your actual output
          local-dir: ./dist/school-management-ui/browser/
          server-dir: /wwwroot/
          dangerous-clean-slate: true
